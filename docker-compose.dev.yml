version: '3.9'
# Updated to avoid conflicts with other projects

services:
  postgres:
    ports:
      - "5434:5432"

  redis:
    ports:
      - "6381:6379"

  minio:
    ports:
      - "9002:9000"
      - "9003:9001"

  meilisearch:
    ports:
      - "7701:7700"
    environment:
      MEILI_ENV: development

  backend:
    build:
      target: development
    ports:
      - "3002:3002"
    volumes:
      - ./backend/src:/app/src:ro
    environment:
      NODE_ENV: development
      PORT: 3002

  web:
    build:
      target: development
    ports:
      - "5174:5173"
    volumes:
      - ./web/src:/app/src:ro
