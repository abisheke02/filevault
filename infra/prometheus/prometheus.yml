global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: filevault

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: filevault-backend
    static_configs:
      - targets: ['backend:3001']
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ['postgres:5432']

  - job_name: redis
    static_configs:
      - targets: ['redis:6379']

  - job_name: minio
    static_configs:
      - targets: ['minio:9000']
    metrics_path: /minio/v2/metrics/cluster

  - job_name: caddy
    static_configs:
      - targets: ['caddy:2019']
    metrics_path: /metrics
